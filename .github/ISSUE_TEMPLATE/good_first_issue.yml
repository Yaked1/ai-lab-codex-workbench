name: Good first issue proposal
description: Propose a small beginner contribution with a named file and check
title: "Good first issue: "
labels: [good first issue]
body:
  - type: textarea
    id: file_scope
    attributes:
      label: Exact file scope
      description: Name the one or two files that may change.
      placeholder: "docs/example.md"
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: State the observable improvement, not a broad cleanup goal.
    validations:
      required: true
  - type: input
    id: acceptance_command
    attributes:
      label: Acceptance command
      description: Give one command that demonstrates success.
      placeholder: "python scripts/repo_health_check.py"
    validations:
      required: true
  - type: textarea
    id: safety_boundary
    attributes:
      label: Safety boundary
      value: |
        Do not edit workflows, dependencies, secrets, generated artifacts, or files outside the named scope.
    validations:
      required: true
  - type: dropdown
    id: review_effort
    attributes:
      label: Expected review effort
      options:
        - About 5 minutes
        - About 15 minutes
        - About 30 minutes
    validations:
      required: true
