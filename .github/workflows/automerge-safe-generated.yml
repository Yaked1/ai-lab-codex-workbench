name: Safe Generated File Automerge

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to check and squash-merge"
        required: true
        type: string

jobs:
  validate:
    name: Validate generated-file policy from trusted base code
    if: >-
      ${{
        (github.event_name == 'pull_request_target' &&
          startsWith(github.event.pull_request.head.ref, 'autopilot/')) ||
        (github.event_name == 'workflow_dispatch' &&
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      checks: read
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      base_sha: ${{ steps.pr.outputs.base_sha }}
    steps:
      - name: Resolve pull request and immutable refs
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          pr_number="$EVENT_PR_NUMBER"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            pr_number="$INPUT_PR_NUMBER"
          fi

          pr_json="$(gh pr view "$pr_number" --json number,headRefName,baseRefName,headRefOid,baseRefOid,headRepositoryOwner,isDraft)"
          head_ref="$(jq -r '.headRefName' <<<"$pr_json")"
          head_owner="$(jq -r '.headRepositoryOwner.login' <<<"$pr_json")"
          is_draft="$(jq -r '.isDraft' <<<"$pr_json")"
          head_sha="$(jq -r '.headRefOid' <<<"$pr_json")"
          base_sha="$(jq -r '.baseRefOid' <<<"$pr_json")"

          if [[ "$head_ref" != autopilot/* ]]; then
            echo "Refusing PR #$pr_number because branch '$head_ref' does not start with autopilot/."
            exit 1
          fi
          if [ "$head_owner" != "$REPOSITORY_OWNER" ]; then
            echo "Refusing PR #$pr_number because it is not from this repository owner."
            exit 1
          fi
          if [ "$is_draft" = "true" ]; then
            echo "Refusing PR #$pr_number because draft pull requests are not auto-merged."
            exit 1
          fi

          {
            echo "pr_number=$pr_number"
            echo "head_sha=$head_sha"
            echo "base_sha=$base_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout recorded PR head for read-only validation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Load and run the base-owned generated-file checker
        env:
          BASE_SHA: ${{ steps.pr.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          TRUSTED_CHECKER: ${{ runner.temp }}/safe-generated-checker/check_safe_generated_diff.py
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$TRUSTED_CHECKER")"
          git show "$BASE_SHA:scripts/check_safe_generated_diff.py" > "$TRUSTED_CHECKER"
          python "$TRUSTED_CHECKER" --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run required local checks
        run: |
          set -euo pipefail
          python scripts/repo_health_check.py --ci
          python scripts/safe_autofix.py --check
          python -m unittest discover -s tests

  merge:
    name: Enable guarded squash merge
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable squash merge without admin bypass
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.validate.outputs.pr_number }}
          HEAD_SHA: ${{ needs.validate.outputs.head_sha }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --squash \
            --auto \
            --match-head-commit "$HEAD_SHA" \
            --subject "Autopilot generated research updates"
