name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Repository health check
        run: python scripts/repo_health_check.py --ci

      - name: Safe autofix check
        run: python scripts/safe_autofix.py --check

      - name: Unit tests
        run: python -m unittest discover -s tests

  windows-runtime:
    name: Validate Windows PowerShell paths
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Repository health check
        shell: pwsh
        run: python scripts/repo_health_check.py --ci

      - name: Safe autofix check
        shell: pwsh
        run: python scripts/safe_autofix.py --check

      - name: Run Windows tests file by file
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $testFiles = Get-ChildItem tests -Filter "test_*.py" | Sort-Object Name
          foreach ($file in $testFiles) {
            $module = "tests." + [System.IO.Path]::GetFileNameWithoutExtension($file.Name)
            Write-Host "=== Running $module ==="
            python -m unittest $module -v
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error title=Windows test failure::$module failed"
              exit $LASTEXITCODE
            }
          }
          Write-Host "All Windows test files passed individually."
