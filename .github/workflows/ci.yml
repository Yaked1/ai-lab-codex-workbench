name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Repository health check
        run: python scripts/repo_health_check.py --ci

      - name: Safe autofix check
        run: python scripts/safe_autofix.py --check

      - name: Unit tests
        run: python -m unittest discover -s tests

  windows-runtime:
    name: Validate Windows PowerShell paths
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Repository health check
        shell: pwsh
        run: python scripts/repo_health_check.py --ci

      - name: Safe autofix check
        shell: pwsh
        run: python scripts/safe_autofix.py --check

      - name: Manifest tests
        shell: pwsh
        continue-on-error: true
        run: python -m unittest tests.test_repository_manifest -v

      - name: Kimi K3 tests
        shell: pwsh
        continue-on-error: true
        run: python -m unittest tests.test_kimi_k3_frontier -v

      - name: Release package tests
        shell: pwsh
        continue-on-error: true
        run: python -m unittest tests.test_build_release_package -v

      - name: Frontier guide tests
        shell: pwsh
        continue-on-error: true
        run: |
          python -m unittest tests.test_model_prompting_guides -v
          python -m unittest tests.test_model_media -v
          python -m unittest tests.test_frontier_model_dossiers -v

      - name: Full unit suite
        shell: pwsh
        run: python -m unittest discover -s tests -v
