name: Safe Autofix PR

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running autofix?"
        required: true
        default: "Apply safe formatting cleanup"

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Apply deterministic safe fixes
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run safe autofix
        run: python scripts/safe_autofix.py --write

      - name: Run validation
        run: |
          python scripts/repo_health_check.py --ci
          python scripts/safe_autofix.py --check
          python -m unittest discover -s tests

      - name: Create pull request if changed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          AUTOFIX_REASON: ${{ inputs.reason }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet; then
            echo "No changes to propose. Civilization spared one PR."
            exit 0
          fi
          BRANCH="automation/safe-autofix-${{ github.run_id }}-${{ github.run_attempt }}"
          git checkout -b "$BRANCH"
          git add --update
          git commit -m "Apply safe autofix"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Apply safe autofix" \
            --body "Automated deterministic cleanup. Reason: $AUTOFIX_REASON" \
            --base "$BASE_BRANCH" \
            --head "$BRANCH"
