name: Curator Prompt Prep

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Guide area to prepare a local Codex prompt for"
        required: true
        default: "all"
        type: choice
        options:
          - skills
          - prompt-guides
          - image-guides
          - model-guides
          - hermes-agent
          - all
      dry_run:
        description: "Tell the local Codex prompt to propose changes instead of editing"
        required: true
        default: true
        type: boolean
      max_sources:
        description: "Maximum candidate sources to include in the local prompt"
        required: true
        default: 5
        type: number

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prep:
    name: Prepare local Codex curator prompt
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      GENERATED_BRANCH: autopilot/generated-${{ github.run_id }}-${{ github.run_attempt }}
      CURATOR_SCOPE: ${{ inputs.scope }}
      CURATOR_DRY_RUN: ${{ inputs.dry_run }}
      CURATOR_MAX_SOURCES: ${{ inputs.max_sources }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare per-run generated branch
        run: |
          set -euo pipefail
          git fetch origin "$BASE_BRANCH"
          git switch -c "$GENERATED_BRANCH" "origin/$BASE_BRANCH"

      - name: Generate local curator prompt
        run: |
          set -euo pipefail
          today="$(date -u +%F)"
          python scripts/generate_curator_prompt.py \
            --date "$today" \
            --scope "$CURATOR_SCOPE" \
            --dry-run "$CURATOR_DRY_RUN" \
            --max-sources "$CURATOR_MAX_SOURCES" \
            --issue-body .tmp/curator-prompt-issue.md

      - name: Validate generated prompt
        run: |
          python scripts/repo_health_check.py --ci
          python scripts/safe_autofix.py --check
          python -m unittest discover -s tests

      - name: Open or update local-run issue
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          ISSUE_TITLE: Run local Codex curator when usage is available
        run: |
          set -euo pipefail
          issue_number="$(gh issue list --state open --search "$ISSUE_TITLE in:title" --json number,title --jq '.[] | select(.title == env.ISSUE_TITLE) | .number' | head -n 1)"
          if [ -n "$issue_number" ]; then
            gh issue edit "$issue_number" --body-file .tmp/curator-prompt-issue.md
          else
            gh issue create --title "$ISSUE_TITLE" --body-file .tmp/curator-prompt-issue.md
          fi

      - name: Publish generated prompt file as a pull request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git add docs/research/curated/curator-prompt-*.md
          python scripts/check_safe_generated_diff.py --staged
          if git diff --cached --quiet; then
            echo "No allowed generated curator prompt changes to publish."
            exit 0
          fi
          git commit -m "Prepare local curator prompt"
          git push origin "$GENERATED_BRANCH"
          gh pr create \
            --title "Prepare local curator prompt" \
            --body "Automated local-curator prompt for human review." \
            --base "$BASE_BRANCH" \
            --head "$GENERATED_BRANCH"
