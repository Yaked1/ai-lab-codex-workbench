name: Repository Autopilot

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Guide area for the generated local curator prompt"
        required: true
        default: "hermes-agent"
        type: choice
        options:
          - skills
          - prompt-guides
          - image-guides
          - model-guides
          - hermes-agent
          - all
      dry_run:
        description: "Tell the generated local prompt to propose changes first"
        required: true
        default: true
        type: boolean
      max_sources:
        description: "Maximum public sources to fetch and include"
        required: true
        default: 5
        type: number
      create_pr:
        description: "Open the generated research pull request"
        required: true
        default: true
        type: boolean
  schedule:
    - cron: "41 7 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: repository-autopilot
  cancel-in-progress: false

jobs:
  generated-research:
    name: Refresh generated research files
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    env:
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      GENERATED_BRANCH: autopilot/generated-${{ github.run_id }}-${{ github.run_attempt }}
      AUTOPILOT_SCOPE: ${{ inputs.scope }}
      AUTOPILOT_DRY_RUN: ${{ inputs.dry_run }}
      AUTOPILOT_MAX_SOURCES: ${{ inputs.max_sources }}
      CREATE_PR: ${{ inputs.create_pr }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare per-run generated branch
        run: |
          set -euo pipefail
          git fetch origin "$BASE_BRANCH"
          git switch -c "$GENERATED_BRANCH" "origin/$BASE_BRANCH"

      - name: Run generated research autopilot
        run: |
          set -euo pipefail

          scope="$AUTOPILOT_SCOPE"
          dry_run="$AUTOPILOT_DRY_RUN"
          max_sources="$AUTOPILOT_MAX_SOURCES"

          if [ -z "$scope" ]; then
            scope="hermes-agent"
          fi
          if [ -z "$dry_run" ]; then
            dry_run="true"
          fi
          if [ -z "$max_sources" ]; then
            max_sources="5"
          fi

          today="$(date -u +%F)"
          python scripts/discover_ai_sources.py --fetch --date "$today" --max-sources "$max_sources"
          python scripts/score_research_candidates.py
          python scripts/generate_research_report.py --date "$today"
          python scripts/generate_curator_prompt.py \
            --date "$today" \
            --scope "$scope" \
            --dry-run "$dry_run" \
            --max-sources "$max_sources"
          python scripts/safe_autofix.py --write

      - name: Validate generated research files
        run: |
          python scripts/repo_health_check.py --ci
          python scripts/safe_autofix.py --check
          python -m unittest discover -s tests

      - name: Publish allowed generated files as a pull request
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_TITLE: Autopilot generated research updates
        run: |
          set -euo pipefail
          if [ -z "$CREATE_PR" ]; then
            CREATE_PR="true"
          fi
          if [ "$CREATE_PR" != "true" ]; then
            echo "create_pr=false, generated research publication was skipped; no branch was pushed."
            exit 0
          fi

          git add data/research/candidates.json docs/research/inbox/*.md docs/research/curated/curator-prompt-*.md
          python scripts/check_safe_generated_diff.py --staged
          if git diff --cached --quiet; then
            echo "No allowed generated research changes to publish."
            exit 0
          fi
          git commit -m "Update generated research autopilot files"
          git push origin "$GENERATED_BRANCH"
          gh pr create \
            --title "$PR_TITLE" \
            --body "Automated generated metadata and local-curator prompts for human review." \
            --base "$BASE_BRANCH" \
            --head "$GENERATED_BRANCH"
