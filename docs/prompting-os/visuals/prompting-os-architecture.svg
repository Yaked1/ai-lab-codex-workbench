<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Prompting OS architecture diagram">
  <rect width="900" height="520" fill="#ffffff"/>
  <text x="450" y="42" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700">Prompting OS Architecture</text>
  <rect x="310" y="80" width="280" height="70" rx="12" fill="#f1f5f9" stroke="#334155"/>
  <text x="450" y="122" text-anchor="middle" font-family="Arial" font-size="18">Kernel: goal, context, constraints</text>
  <rect x="70" y="210" width="190" height="70" rx="12" fill="#eef2ff" stroke="#334155"/>
